# Release Portal V3 Docker 部署
# 使用 Docker Compose 快速部署

version: '3.8'

services:
  # Release Portal Web 服务
  web:
    build: .
    container_name: release-portal
    ports:
      - "5000:5000"
    volumes:
      # 数据持久化
      - ./data:/app/data
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./backups:/app/backups
    environment:
      # 数据库配置
      - RELEASE_PORTAL_DB=/app/data/portal.db
      
      # 安全配置（请修改！）
      - RELEASE_PORTAL_SECRET=change-this-to-a-random-secret-key-in-production
      - RELEASE_PORTAL_TOKEN_EXPIRY_HOURS=24
      
      # Flask 配置
      - FLASK_ENV=production
      - FLASK_DEBUG=0
      
      # 存储配置
      - RELEASE_PORTAL_STORAGE_DIR=/app/storage
      - RELEASE_PORTAL_TEMP_DIR=/tmp
      - RELEASE_PORTAL_MAX_UPLOAD_SIZE=500
      
      # 日志配置
      - RELEASE_PORTAL_LOG_DIR=/app/logs
      - RELEASE_PORTAL_LOG_LEVEL=INFO
      
      # 备份配置
      - RELEASE_PORTAL_BACKUP_DIR=/app/backups
      - RELEASE_PORTAL_BACKUP_RETENTION_DAYS=30
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx 反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: release-portal-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./release_portal/presentation/web/static:/usr/share/nginx/html/static:ro
    depends_on:
      - web
    restart: unless-stopped
    profiles:
      - with-nginx

volumes:
  data:
  storage:
  logs:
  backups:

networks:
  default:
    name: release-portal-network
